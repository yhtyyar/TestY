name: Docker Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build Images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t testy-backend -f backend/testy/scripts/Dockerfile .

      - name: Build frontend image
        run: docker build -t testy-frontend -f frontend/Dockerfile.dev ./frontend

      - name: Verify Docker Compose config (dev)
        run: docker compose -f docker-compose-dev.yml config --quiet

      - name: Verify Docker Compose config (prod)
        run: docker compose -f docker-compose.yml config --quiet
