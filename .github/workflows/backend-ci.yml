name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - 'setup.py'
      - 'setup.cfg'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - 'setup.py'
      - 'setup.cfg'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: pip install flake8 isort wemake-python-styleguide
      - name: Run flake8
        run: flake8 backend/
      - name: Check import order
        run: isort --check-only backend/

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:14.5-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DJANGO_SETTINGS_MODULE: root.settings.development
      POSTGRES_NAME: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_SERVICE_HOST: localhost
      POSTGRES_SERVICE_PORT: 5432
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      CELERY_BROKER_URL: redis://localhost:6379
      CELERY_RESULT_BACKEND: redis://localhost:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install dependencies
        run: pip install -e ".[dev]" 2>/dev/null || pip install -e "."
      - name: Run tests
        run: pytest --cov --cov-report=xml --cov-fail-under=86
        working-directory: backend/testy
